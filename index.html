<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus-1 Multi-Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #121214; --accent: #007AFF; --text: #f0f0f0; --safe-bottom: env(safe-area-inset-bottom, 20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Navigation Bar */
        #nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(18, 18, 20, 0.9); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom); z-index: 1000; backdrop-filter: blur(20px);
        }
        .nav-btn { background: none; border: none; color: #555; font-size: 10px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); transform: translateY(-2px); }
        .nav-btn span { font-size: 24px; }

        /* Screens */
        .view { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 75px - var(--safe-bottom)); display: none; flex-direction: column; overflow-y: auto; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* SMS Chat UI */
        #chat-window { flex: 1; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #262629; color: #fff; border-bottom-left-radius: 4px; border: 1px solid #333; }
        
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #222; }
        .header img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #222; }
        .header h2 { margin: 0; font-size: 18px; letter-spacing: -0.5px; }

        #input-area {
            position: fixed; bottom: calc(75px + var(--safe-bottom)); width: 100%; padding: 12px 16px;
            background: var(--bg); display: flex; gap: 10px; align-items: center; border-top: 1px solid #1a1a1a;
        }
        #user-msg { flex: 1; background: #1c1c1e; border: 1px solid #2c2c2e; color: white; padding: 12px 18px; border-radius: 24px; outline: none; font-size: 16px; }

        /* Forms / Creator */
        .card { background: var(--panel); padding: 20px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; }
        label { display: block; font-size: 11px; color: #777; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 14px; border-radius: 12px; font-size: 15px; outline: none; margin-bottom: 15px; transition: border 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); }
        .portrait-frame { width: 100px; height: 100px; border-radius: 50%; background: #000; border: 2px dashed #444; margin: 0 auto 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .portrait-frame img { width: 100%; height: 100%; object-fit: cover; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

<div id="view-chat" class="view active">
    <div class="header">
        <img id="active-pfp" src="" style="display:none;">
        <h2 id="active-name">Setup Required</h2>
    </div>
    <div id="chat-window"></div>
    <div id="input-area">
        <input type="text" id="user-msg" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:none; border:none; color:var(--accent); font-weight:700; font-size:16px;">Send</button>
    </div>
</div>

<div id="view-create" class="view">
    <div class="card">
        <div class="portrait-frame" onclick="document.getElementById('img-upload').click()">
            <img id="preview-img" src="">
            <span id="plus-icon" style="color:#444; font-size:30px;">+</span>
        </div>
        <input type="file" id="img-upload" hidden accept="image/*" onchange="handleImg(this)">
        
        <label>Identity Name</label>
        <input type="text" id="bot-name" placeholder="Serana, Jester, etc.">
        
        <label>Personality (Absolute Law)</label>
        <textarea id="bot-pers" placeholder="e.g. You are blunt, sarcastic, and never apologize."></textarea>
        
        <label>Physicality</label>
        <textarea id="bot-phys" placeholder="Eye color, height, specific clothing..."></textarea>
        
        <label>Lore / Long-term Memory</label>
        <textarea id="bot-lore" placeholder="Background info they must always remember."></textarea>
        
        <button class="btn-primary" onclick="buildBot()">ACTIVATE BOT</button>
    </div>
</div>

<div id="view-opts" class="view">
    <div class="card">
        <label>Groq API Key</label>
        <input type="password" id="api-key" placeholder="Enter key..." oninput="saveKey()">
        <button onclick="clearHistory()" style="background:#440000; color:white; border:none; padding:12px; border-radius:8px; width:100%; font-size:13px;">Wipe Current Chat</button>
    </div>
</div>

<div id="nav-bar">
    <button class="nav-btn active" onclick="switchTab('chat', this)"><span>💬</span>Chats</button>
    <button class="nav-btn" onclick="switchTab('create', this)"><span>✨</span>Create</button>
    <button class="nav-btn" onclick="switchTab('opts', this)"><span>⚙️</span>Options</button>
</div>

<script>
    let bot = JSON.parse(localStorage.getItem('nexus_bot')) || null;
    let history = JSON.parse(localStorage.getItem('nexus_hist')) || [];

    function switchTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-'+id).classList.add('active');
        btn.classList.add('active');
    }

    function handleImg(input) {
        const fr = new FileReader();
        fr.onload = e => {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('plus-icon').style.display = 'none';
        };
        fr.readAsDataURL(input.files[0]);
    }

    function buildBot() {
        bot = {
            name: document.getElementById('bot-name').value,
            pers: document.getElementById('bot-pers').value,
            phys: document.getElementById('bot-phys').value,
