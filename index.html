<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus-1 Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #121214; --accent: #007AFF; --text: #f0f0f0; --safe-bottom: env(safe-area-inset-bottom, 20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Navigation */
        #nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(18, 18, 20, 0.95); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom); z-index: 1000; backdrop-filter: blur(20px);
        }
        .nav-btn { background: none; border: none; color: #555; font-size: 10px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; height: 100%; justify-content: center; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span { font-size: 24px; }

        /* Screens */
        .view { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 75px - var(--safe-bottom)); display: none; flex-direction: column; overflow-y: auto; padding: 20px; }
        .view.active { display: flex; }

        /* Chat UI */
        #chat-window { flex: 1; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #262629; color: #fff; border-bottom-left-radius: 4px; border: 1px solid #333; }
        
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #222; }
        .header img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #222; }

        #input-area {
            position: fixed; bottom: calc(75px + var(--safe-bottom)); width: 100%; padding: 12px 16px;
            background: var(--bg); display: flex; gap: 10px; border-top: 1px solid #1a1a1a;
        }
        #user-msg { flex: 1; background: #1c1c1e; border: 1px solid #2c2c2e; color: white; padding: 12px 18px; border-radius: 24px; outline: none; font-size: 16px; }

        /* Bot List Styling */
        .bot-card { background: var(--panel); padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 1px solid #222; cursor: pointer; position: relative; }
        .bot-card img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .bot-card.active { border-color: var(--accent); background: #1a1a1f; }
        .edit-icon { position: absolute; right: 15px; font-size: 18px; opacity: 0.5; }

        /* Forms */
        .card { background: var(--panel); padding: 20px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        label { font-size: 11px; color: #777; font-weight: 700; text-transform: uppercase; }
        .counter { font-size: 10px; color: #444; }
        
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 14px; border-radius: 12px; font-size: 15px; outline: none; margin-bottom: 15px; }
        .portrait-frame { width: 100px; height: 100px; border-radius: 50%; background: #000; border: 2px dashed #444; margin: 0 auto 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .portrait-frame img { width: 100%; height: 100%; object-fit: cover; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="view-chat" class="view active">
    <div id="selection-screen">
        <h2 style="margin-bottom:20px;">Your Library</h2>
        <div id="bot-library-list"></div>
        <button class="btn-primary" onclick="navToCreator()">+ CREATE NEW BOT</button>
    </div>

    <div id="chat-screen" style="display:none;">
        <div class="header">
            <button onclick="backToLibrary()" style="background:none; border:none; color:var(--accent); font-size:24px; padding:0 10px;">←</button>
            <img id="active-pfp" src="">
            <h2 id="active-name" style="margin:0"></h2>
        </div>
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="user-msg" placeholder="Message..." onkeypress="if(event.key==='Enter') handleSend()">
            <button onclick="handleSend()" style="background:none; border:none; color:var(--accent); font-weight:700;">Send</button>
        </div>
    </div>
</div>

<div id="view-create" class="view">
    <h2 id="creator-title">Create Bot</h2>
    <div class="card">
        <div class="portrait-frame" onclick="document.getElementById('img-upload').click()">
            <img id="preview-img" src="" style="display:none">
            <span id="plus-icon" style="color:#444; font-size:30px;">+</span>
        </div>
        <input type="file" id="img-upload" hidden accept="image/*" onchange="processImage(this)">
        
        <div class="label-row"><label>Identity Name</label><span class="counter" id="count-name">0/50</span></div>
        <input type="text" id="bot-name-in" maxlength="50" oninput="updateCount('bot-name-in', 'count-name', 50)">
        
        <div class="label-row"><label>Personality</label><span class="counter" id="count-pers">0/2500</span></div>
        <textarea id="bot-pers-in" maxlength="2500" oninput="updateCount('bot-pers-in', 'count-pers', 2500)"></textarea>
        
        <div class="label-row"><label>Physical Description</label><span class="counter" id="count-phys">0/1500</span></div>
        <textarea id="bot-phys-in" maxlength="1500" oninput="updateCount('bot-phys-in', 'count-phys', 1500)"></textarea>
        
        <div class="label-row"><label>Lore</label><span class="counter" id="count-lore">0/10000</span></div>
        <textarea id="bot-lore-in" maxlength="10000" oninput="updateCount('bot-lore-in', 'count-lore', 10000)"></textarea>
        
        <button class="btn-primary" id="save-btn" onclick="saveBot()">SAVE & ACTIVATE</button>
        <button id="delete-btn" onclick="deleteBot()" style="background:none; color:#ff3b30; border:none; width:100%; margin-top:15px; display:none; font-weight:600;">DELETE BOT</button>
    </div>
</div>

<div id="view-opts" class="view">
    <div class="card">
        <label>Groq API Key</label>
        <input type="password" id="api-key-in" oninput="saveKey()" placeholder="Enter your key">
    </div>
</div>

<div id="nav-bar">
    <button class="nav-btn active" id="nav-chat-btn" onclick="nav('chat', this)"><span>💬</span>Chats</button>
    <button class="nav-btn" onclick="navToCreator()"><span>✨</span>Create</button>
    <button class="nav-btn" onclick="nav('opts', this)"><span>⚙️</span>Options</button>
</div>

<script>
    let library = JSON.parse(localStorage.getItem('nx_lib')) || [];
    let currentBotId = localStorage.getItem('nx_active_id') || null;
    let histories = JSON.parse(localStorage.getItem('nx_hists')) || {}; // Separate histories per bot
    let editingId = null;

    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        if(btn) btn.classList.add('active');
        if(id === 'chat' && !currentBotId) backToLibrary();
        if(id === 'chat' && currentBotId) openBot(currentBotId);
    }

    function updateCount(inputId, countId, max) {
        document.getElementById(countId).innerText = `${document.getElementById(inputId).value.length}/${max}`;
    }

    function processImage(input) {
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('preview-img').style.display = 'block';
            document.getElementById('plus-icon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function navToCreator(id = null) {
        editingId = id;
        document.getElementById('creator-title').innerText = id ? "Edit Bot" : "Create Bot";
        document.getElementById('save-btn').innerText = id ? "UPDATE BOT" : "ACTIVATE BOT";
        document.getElementById('delete-btn').style.display = id ? "block" : "none";
        
        if(id) {
            const b = library.find(x => x.id === id);
            document.getElementById('bot-name-in').value = b.name;
            document.getElementById('bot-pers-in').value = b.pers;
            document.getElementById('bot-phys-in').value = b.phys;
            document.getElementById('bot-lore-in').value = b.lore;
            document.getElementById('preview-img').src = b.img;
            document.getElementById('preview-img').style.display = 'block';
            document.getElementById('plus-icon').style.display = 'none';
        } else {
            document.getElementById('bot-name-in').value = "";
            document.getElementById('bot-pers-in').value = "";
            document.getElementById('bot-phys-in').value = "";
            document.getElementById('bot-lore-in').value = "";
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('plus-icon').style.display = 'block';
        }
        nav('create');
    }

    function saveBot() {
        const bot = {
            id: editingId || Date.now().toString(),
            name: document.getElementById('bot-name-in').value,
            pers: document.getElementById('bot-pers-in').value,
            phys: document.getElementById('bot-phys-in').value,
            lore: document.getElementById('bot-lore-in').value,
            img: document.getElementById('preview-img').src
        };
        
        if(editingId) library = library.map(x => x.id === editingId ? bot : x);
        else library.push(bot);
        
        localStorage.setItem('nx_lib', JSON.stringify(library));
        openBot(bot.id);
    }

    function deleteBot() {
        if(!confirm("Delete this bot and its chat history?")) return;
        library = library.filter(x => x.id !== editingId);
        delete histories[editingId];
        localStorage.setItem('nx_lib', JSON.stringify(library));
        localStorage.setItem('nx_hists', JSON.stringify(histories));
        currentBotId = null;
        backToLibrary();
    }

    function backToLibrary() {
        currentBotId = null;
        document.getElementById('selection-screen').style.display = 'block';
        document.getElementById('chat-screen').style.display = 'none';
        renderLibrary();
    }

    function renderLibrary() {
        const list = document.getElementById('bot-library-list');
        list.innerHTML = library.map(b => `
            <div class="bot-card" onclick="openBot('${b.id}')">
                <img src="${b.img}">
                <div><strong>${b.name}</strong></div>
                <div class="edit-icon" onclick="event.stopPropagation(); navToCreator('${b.id}')">⚙️</div>
            </div>
        `).join('');
    }

    function openBot(id) {
        currentBotId = id;
        localStorage.setItem('nx_active_id', id);
        const b = library.find(x => x.id === id);
        document.getElementById('active-name').innerText = b.name;
        document.getElementById('active-pfp').src = b.img;
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        nav('chat', document.getElementById('nav-chat-btn'));
        renderChat();
    }

    function renderChat() {
        const win = document.getElementById('chat-window');
        const h = histories[currentBotId] || [];
        win.innerHTML = h.map(m => `<div class="bubble ${m.role}">${m.content}</div>`).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function handleSend() {
        const msg = document.getElementById('user-msg');
        const key = localStorage.getItem('nx_key');
        const b = library.find(x => x.id === currentBotId);
        if(!msg.value.trim() || !b || !key) return;

        if(!histories[currentBotId]) histories[currentBotId] = [];
        histories[currentBotId].push({role:'user', content: msg.value});
        msg.value = '';
        renderChat();

        const sys = `Law: You are ${b.name}. Personality: ${b.pers}. Physical: ${b.phys}. Lore: ${b.lore}.`;

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": "Bearer "+key, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{role:"system", content:sys}, ...histories[currentBotId]],
                    temperature: 0.8
                })
            });
            const d = await r.json();
            histories[currentBotId].push(d.choices[0].message);
            localStorage.setItem('nx_hists', JSON.stringify(histories));
            renderChat();
        } catch(e) { alert("Check API Key."); }
    }

    function saveKey() { localStorage.setItem('nx_key', document.getElementById('api-key-in').value); }

    window.onload = () => {
        document.getElementById('api-key-in').value = localStorage.getItem('nx_key') || '';
        renderLibrary();
    };
</script>
</body>
</html>
