<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus-1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #121214; --accent: #007AFF; --text: #f0f0f0; --safe-bottom: env(safe-area-inset-bottom, 20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Navigation */
        #nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(18, 18, 20, 0.95); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom); z-index: 1000; backdrop-filter: blur(20px);
        }
        .nav-btn { background: none; border: none; color: #555; font-size: 10px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; height: 100%; justify-content: center; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span { font-size: 24px; }

        /* Screens */
        .view { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 75px - var(--safe-bottom)); display: none; flex-direction: column; overflow-y: auto; padding: 20px; }
        .view.active { display: flex; }

        /* Chat UI */
        #chat-window { flex: 1; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #262629; color: #fff; border-bottom-left-radius: 4px; border: 1px solid #333; }
        
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid #222; }
        #active-pfp { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #222; display: none; }

        #input-area {
            position: fixed; bottom: calc(75px + var(--safe-bottom)); width: 100%; padding: 12px 16px;
            background: var(--bg); display: flex; gap: 10px; border-top: 1px solid #1a1a1a;
        }
        #user-msg { flex: 1; background: #1c1c1e; border: 1px solid #2c2c2e; color: white; padding: 12px 18px; border-radius: 24px; outline: none; font-size: 16px; }

        /* Forms */
        .card { background: var(--panel); padding: 20px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; }
        label { display: block; font-size: 11px; color: #777; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 14px; border-radius: 12px; font-size: 15px; outline: none; margin-bottom: 15px; }
        .portrait-frame { width: 100px; height: 100px; border-radius: 50%; background: #000; border: 2px dashed #444; margin: 0 auto 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .portrait-frame img { width: 100%; height: 100%; object-fit: cover; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="view-chat" class="view active">
    <div class="header">
        <img id="active-pfp" src="">
        <h2 id="active-name" style="margin:0">Set Up Bot</h2>
    </div>
    <div id="chat-window"></div>
    <div id="input-area">
        <input type="text" id="user-msg" placeholder="Message..." onkeypress="if(event.key==='Enter') handleSend()">
        <button onclick="handleSend()" style="background:none; border:none; color:var(--accent); font-weight:700;">Send</button>
    </div>
</div>

<div id="view-create" class="view">
    <div class="card">
        <div class="portrait-frame" onclick="document.getElementById('img-upload').click()">
            <img id="preview-img" src="" style="display:none">
            <span id="plus-icon" style="color:#444; font-size:30px;">+</span>
        </div>
        <input type="file" id="img-upload" hidden accept="image/*" onchange="processImage(this)">
        <label>Identity Name</label>
        <input type="text" id="bot-name-in">
        <label>Personality (Law)</label>
        <textarea id="bot-pers-in"></textarea>
        <label>Physicality</label>
        <textarea id="bot-phys-in"></textarea>
        <label>Lore</label>
        <textarea id="bot-lore-in"></textarea>
        <button class="btn-primary" onclick="createNewBot()">ACTIVATE BOT</button>
    </div>
</div>

<div id="view-opts" class="view">
    <div class="card">
        <label>Groq API Key</label>
        <input type="password" id="api-key-in" oninput="saveKey()">
        <button onclick="wipe()" style="background:#400; color:white; border:none; padding:12px; border-radius:8px; width:100%;">Clear Chat</button>
    </div>
</div>

<div id="nav-bar">
    <button class="nav-btn active" onclick="nav('chat', this)"><span>💬</span>Chats</button>
    <button class="nav-btn" onclick="nav('create', this)"><span>✨</span>Create</button>
    <button class="nav-btn" onclick="nav('opts', this)"><span>⚙️</span>Options</button>
</div>

<script>
    let botData = JSON.parse(localStorage.getItem('n_bot')) || null;
    let chatLog = JSON.parse(localStorage.getItem('n_log')) || [];

    // FIXED NAVIGATION
    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        btn.classList.add('active');
    }

    function processImage(input) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.getElementById('preview-img');
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById('plus-icon').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function createNewBot() {
        botData = {
            name: document.getElementById('bot-name-in').value,
            pers: document.getElementById('bot-pers-in').value,
            phys: document.getElementById('bot-phys-in').value,
            lore: document.getElementById('bot-lore-in').value,
            img: document.getElementById('preview-img').src
        };
        localStorage.setItem('n_bot', JSON.stringify(botData));
        wipe();
        loadBotUI();
        nav('chat', document.querySelector('.nav-btn'));
    }

    function loadBotUI() {
        if (!botData) return;
        document.getElementById('active-name').innerText = botData.name;
        const pfp = document.getElementById('active-pfp');
        pfp.src = botData.img;
        pfp.style.display = 'block';
        
        // Populate inputs so they don't disappear on refresh
        document.getElementById('bot-name-in').value = botData.name;
        document.getElementById('bot-pers-in').value = botData.pers;
        document.getElementById('bot-phys-in').value = botData.phys;
        document.getElementById('bot-lore-in').value = botData.lore;
        if(botData.img) {
            document.getElementById('preview-img').src = botData.img;
            document.getElementById('preview-img').style.display = 'block';
            document.getElementById('plus-icon').style.display = 'none';
        }
        renderLog();
    }

    function renderLog() {
        const win = document.getElementById('chat-window');
        win.innerHTML = chatLog.map(m => `<div class="bubble ${m.role === 'user' ? 'user' : 'bot'}">${m.content}</div>`).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function handleSend() {
        const msg = document.getElementById('user-msg');
        const key = localStorage.getItem('n_key');
        if (!msg.value.trim() || !botData || !key) return;

        chatLog.push({ role: 'user', content: msg.value });
        const currentInput = msg.value;
        msg.value = '';
        renderLog();

        const sys = `Law: You are ${botData.name}. Personality: ${botData.pers}. Physical: ${botData.phys}. Lore: ${botData.lore}.`;

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: sys }, ...chatLog],
                    temperature: 0.8
                })
            });
            const d = await r.json();
            chatLog.push(d.choices[0].message);
            localStorage.setItem('n_log', JSON.stringify(chatLog));
            renderLog();
        } catch (e) { alert("API Error. Check Key."); }
    }

    function saveKey() { localStorage.setItem('n_key', document.getElementById('api-key-in').value); }
    function wipe() { chatLog = []; localStorage.removeItem('n_log'); renderLog(); }

    window.onload = () => {
        document.getElementById('api-key-in').value = localStorage.getItem('n_key') || '';
        loadBotUI();
    };
</script>
</body>
</html>
